spring:
  application:
    name: kairos

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:kairos}
    username: ${POSTGRES_USER:kairos}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  neo4j:
    uri: bolt://${NEO4J_HOST:localhost}:${NEO4J_BOLT_PORT:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

logging:
  level:
    com.kairos: INFO

auth:
  session:
    secret: ${AUTH_SESSION_SECRET:dev-only-change-me-dev-only-change-me}
    issuer: ${AUTH_SESSION_ISSUER:kairos}
    access-token-ttl: ${AUTH_ACCESS_TOKEN_TTL:2h}

gemini:
  apiKey: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gpt-4.0}
  temperature: 0.7
  maxOutputTokens: 2048
  timeoutSeconds: 30
  retry:
    maxRetries: 3
    delay: 2000
    multiplier: 2.0
    maxDelay: 60000
